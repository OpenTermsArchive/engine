name: Test

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    strategy:
      matrix:
        operating_system: 
          - ubuntu-22.04
          - windows-latest
          - macos-latest
        node_version:
          - 22
          - 26
        exclude:
          - operating_system: windows-latest
            node_version: 26
          - operating_system: macos-latest
            node_version: 26
      fail-fast: false # run tests on other operating systems even if one fails

    runs-on: ${{ matrix.operating_system }}

    steps:
      - run: |
          git config --global core.autocrlf false
      - uses: actions/checkout@v4
      # Homebrew refuses formulae from untrusted third-party taps, so trust mongodb/brew before ankane/setup-mongodb installs from it. See https://github.com/ankane/setup-mongodb/issues/7
      - name: Trust MongoDB Homebrew tap on macOS
        if: ${{ runner.os == 'macOS' }}
        run: |
          brew tap mongodb/brew
          brew trust mongodb/brew
      - uses: ankane/setup-mongodb@v1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
      - run: npm ci
      - name: Run tests (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: npm test
      - name: Run tests (Windows or macOS)
        if: ${{ runner.os == 'Windows' || runner.os == 'macOS' }}
        run: npm test -- --timeout 5000

  validate_declarations:
    strategy:
      matrix:
        operating_system: 
          - ubuntu-22.04 # Using Ubuntu 22.04 due to AppArmor restrictions in newer versions (23.10+) that interfere with Puppeteer's sandbox functionality. See https://pptr.dev/troubleshooting#issues-with-apparmor-on-ubuntu
          - windows-latest
          - macos-latest
        node_version:
          - 22
          - 26
        exclude:
          - operating_system: windows-latest
            node_version: 26
          - operating_system: macos-latest
            node_version: 26
      fail-fast: false # run tests on other operating systems even if one fails

    runs-on: ${{ matrix.operating_system }}

    steps:
      - run: |
          git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: OpenTermsArchive/demo-declarations
          path: ./demo-declarations
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
      - run: cd ./demo-declarations && npm install
      - run: npm ci
      - run: ./node_modules/.bin/cross-env NODE_ENV=ci npm run declarations:lint
      - run: ./node_modules/.bin/cross-env NODE_ENV=ci npm run declarations:validate:schema

  validate_metadata:
    strategy:
      matrix:
        operating_system: 
          - ubuntu-22.04
          - windows-latest
          - macos-latest
        node_version:
          - 22
          - 26
        exclude:
          - operating_system: windows-latest
            node_version: 26
          - operating_system: macos-latest
            node_version: 26
      fail-fast: false

    runs-on: ${{ matrix.operating_system }}

    steps:
      - run: |
          git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: OpenTermsArchive/demo-declarations
          path: ./demo-declarations
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
      - run: cd ./demo-declarations && npm install
      - run: npm ci
      - run: ./node_modules/.bin/cross-env NODE_ENV=ci npm run metadata:validate
